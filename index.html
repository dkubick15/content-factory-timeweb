<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Контент-завод</title>
  <meta name="description" content="Контент-завод: подготовка материалов и публикация в Telegram сразу или по расписанию." />

  <link rel="stylesheet" href="/style.css" />

</head>

<body>
  <div class="loading-line" id="loadingLine"></div>

  <section class="auth" id="authScreen">
    <div class="auth-card">
      <h1 class="title-xl auth-title">Контент-завод</h1>
      <p class="text auth-description" id="authText">Подготовка и публикация материалов в Telegram.</p>

      <form class="form" id="authForm">
        <label class="field">
          <span class="label">Логин</span>
          <input class="input" id="emailInput" type="text" placeholder="kubik" autocomplete="username" required />
        </label>

        <div class="field">
          <label class="label" for="passwordInput">Пароль</label>
          <div class="password-field">
            <input class="input" id="passwordInput" type="password" placeholder="••••••••"
              autocomplete="current-password" required />
            <button class="btn icon-only" type="button" data-auth-password-toggle
              aria-label="Показать пароль"></button>
          </div>
        </div>

        <button class="btn primary auth-submit" id="authSubmitBtn" type="submit">Войти</button>
        <button class="btn is-hidden" id="authModeToggle" type="button"></button>
        <div class="notice auth-error is-hidden" id="authError"></div>
      </form>
    </div>
  </section>

  <button class="burger-btn" id="burgerBtn" type="button" data-action="toggle-burger"
    aria-controls="sidebar" aria-expanded="false">Меню</button>

  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">Контент-завод</div>
      <nav class="nav" id="nav" role="navigation"></nav>
      <div class="sidebar-footer">
        <button class="btn danger sidebar-clear" data-action="clear-workspace-all">
          Очистить всё
        </button>
        <div class="account-pill" id="accountPill">
        </div>
      </div>
    </aside>

    <main class="main" id="main"></main>
  </div>

  <div class="modal-root" id="modalRoot"></div>

  <div class="generation-overlay" id="generationOverlay" role="status" aria-live="polite" aria-hidden="true">
    <div class="generation-spinner"></div>
    <h2 class="title generation-title">Нейросеть в работе</h2>
    <p class="text generation-text" id="generationText">Анализ брифа...</p>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">Готово</div>

  <script src="/script.js" defer></script>
</body>

</html>
